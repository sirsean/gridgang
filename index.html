<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Dock crews in the leviathan lattices thread colossal containers through corridors tight enough to kill. Gridgang is a cassette-future cargo puzzle inspired by that grind—and the smuggling that slips through every port."
    />
    <meta name="theme-color" content="#14161a" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Gridgang" />
    <meta property="og:title" content="Gridgang" />
    <meta
      property="og:description"
      content="Dock crews in the leviathan lattices thread colossal containers through corridors tight enough to kill. Gridgang is a cassette-future cargo puzzle inspired by that grind—and the smuggling that slips through every port."
    />
    <meta property="og:url" content="https://gridgang.sirsean.me/" />
    <meta
      property="og:image"
      content="https://gridgang.sirsean.me/assets/share/og-hero.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Grimy leviathan cargo lattice with massive containers in tight docking lanes" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gridgang" />
    <meta
      name="twitter:description"
      content="Dock crews in the leviathan lattices thread colossal containers through corridors tight enough to kill. Gridgang is a cassette-future cargo puzzle inspired by that grind—and the smuggling that slips through every port."
    />
    <meta
      name="twitter:image"
      content="https://gridgang.sirsean.me/assets/share/og-hero.png"
    />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="canonical" href="https://gridgang.sirsean.me/" />
    <title>Gridgang</title>
  </head>
  <body>
    <div id="app">
      <main id="home-screen" class="home-screen" aria-label="Gridgang home">
        <img
          class="home-mark"
          src="/assets/grid-gang-icon.png"
          alt="Grid Gang icon"
          width="160"
          height="160"
        />
        <p class="eyebrow">Dock Rotation</p>
        <h1>Gridgang</h1>
        <div class="home-status-strip" aria-hidden="true"></div>
        <div
          id="mission-list"
          class="mission-list"
          aria-label="Dock missions"
        ></div>
      </main>

      <main
        id="game-screen"
        class="shell is-hidden"
        aria-label="Gridgang game shell"
      >
        <section class="masthead" aria-label="Run status">
          <img
            class="mark"
            src="/assets/grid-gang-icon.png"
            alt="Grid Gang icon"
            width="72"
            height="72"
          />
          <div>
            <p id="game-dock-label" class="eyebrow">Dock 50</p>
            <h1>Gridgang</h1>
          </div>
        </section>
        <div id="game" aria-label="Gridgang game canvas"></div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
